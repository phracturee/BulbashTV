version: '3.8'

services:
  bulbashtv:
    build: .
    container_name: bulbashtv
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # Persist data files
      - ./data:/app/data
      - ./logs:/app/logs
      - ./downloads:/app/downloads
      - ./cookies:/app/cookies
      - ./static/img:/app/static/img
      # Config file
      - ./config.py:/app/config.py:ro
    environment:
      - TZ=Europe/Moscow
    networks:
      - bulbashtv_network

networks:
  bulbashtv_network:
    driver: bridge
