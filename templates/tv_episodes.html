<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ item.title }} - Сезоны и серии - BulbashTV</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        /* Override sidebar styles */
        .sidebar,
        .sidebar ul,
        .sidebar li,
        .sidebar a,
        .sidebar a:hover,
        .sidebar a.active {
            background: transparent !important;
            box-shadow: none !important;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: rgba(218, 165, 32, 0.2) !important;
        }

        .tv-series-page {
            position: relative;
            padding: 30px 40px 30px 120px;
            min-height: 100vh;
        }

        /* Backdrop */
        .tv-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 100vh;
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        .tv-backdrop-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                linear-gradient(to right, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.7) 30%, rgba(0,0,0,0.5) 100%),
                linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.6) 50%, rgba(0,0,0,0.95) 100%);
        }

        /* Content */
        .tv-content {
            position: relative;
            z-index: 2;
        }

        /* Back button */
        .back-to-prev {
            position: fixed;
            top: 15px;
            left: 15px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: transparent;
            color: var(--text-color);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            z-index: 1000;
        }

        .back-to-prev:hover {
            color: var(--accent);
            background: rgba(218, 165, 32, 0.2);
        }

        /* Two column layout */
        .tv-show-layout {
            display: flex;
            gap: 30px;
            margin-top: 20px;
            height: calc(100vh - 150px);
        }

        /* Seasons list - left column */
        .seasons-list-container {
            width: 280px;
            flex-shrink: 0;
            height: calc(100vh - 100px);
            overflow-y: auto;
        }

        .seasons-list-container::-webkit-scrollbar {
            width: 8px;
        }

        .seasons-list-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .seasons-list-container::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        .season-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text-color);
        }

        .season-item:last-child {
            margin-bottom: 0;
        }

        .season-item:hover {
            background: rgba(60, 60, 60, 0.8);
            border-color: var(--accent);
        }

        .season-item.active {
            background: rgba(218, 165, 32, 0.2);
            border-color: var(--accent);
        }

        .season-item h4 {
            margin: 0 0 5px 0;
            font-size: 1rem;
            font-weight: 600;
        }

        .season-item p {
            margin: 0;
            font-size: 0.8rem;
            color: #888;
        }

        /* Episodes list - center column */
        .episodes-list-container {
            flex: 1;
            min-width: 0;
            height: calc(100vh - 100px);
            overflow-y: auto;
        }

        .episodes-list-container::-webkit-scrollbar {
            width: 8px;
        }

        .episodes-list-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .episodes-list-container::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        /* Episode info - right column */
        .episode-info-container {
            width: 350px;
            flex-shrink: 0;
            height: calc(100vh - 100px);
            overflow-y: auto;
        }

        .episode-info-container::-webkit-scrollbar {
            width: 8px;
        }

        .episode-info-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .episode-info-container::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        .episode-info-placeholder {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .episode-info-placeholder i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .episode-info-placeholder p {
            font-size: 1rem;
        }

        .episode-details {
            color: var(--text-color);
            padding: 20px;
        }

        .episode-details-header {
            margin-bottom: 25px;
            padding-bottom: 0;
        }

        .episode-details-header h3 {
            margin: 0 0 10px 0;
            font-size: 1.3rem;
            color: var(--text-color);
        }

        .episode-details-header .episode-number {
            display: inline-block;
            background: rgba(218, 165, 32, 0.2);
            color: var(--accent);
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .episode-meta-details {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }

        .episode-meta-details span {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #888;
        }

        .episode-meta-details .rating {
            color: var(--accent);
        }

        .episode-description {
            line-height: 1.6;
            color: #aaa;
        }

        .episode-description h4 {
            margin: 0 0 10px 0;
            font-size: 0.95rem;
            color: var(--text-color);
        }

        .episode-description p {
            margin: 0;
            font-size: 0.9rem;
        }

        .episodes-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .episode-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .episode-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
        }

        .episode-item.active {
            background: rgba(218, 165, 32, 0.2);
            border-color: var(--accent);
        }

        .episode-item.aired-future {
            background: rgba(100, 100, 100, 0.3);
            border-color: rgba(100, 100, 100, 0.5);
            cursor: not-allowed;
            opacity: 0.5;
        }

        .episode-item.aired-future:hover {
            background: rgba(100, 100, 100, 0.3);
            border-color: rgba(100, 100, 100, 0.5);
            transform: none;
        }

        .episode-number-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #fff;
            min-width: 75px;
            text-align: center;
        }

        .episode-info {
            flex: 1;
            min-width: 0;
        }

        .episode-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .episode-meta {
            display: flex;
            gap: 15px;
            font-size: 0.8rem;
            color: #888;
        }

        .episode-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .episode-meta .rating {
            color: var(--accent);
        }

        /* Episode buttons */
        .episode-buttons {
            display: flex;
            gap: 8px;
        }

        .episode-btn {
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .episode-btn-watched {
            background: rgba(76, 175, 80, 0.3);
            color: #4CAF50;
            border: 1px solid #4CAF50;
        }

        .episode-btn-watched:hover {
            background: rgba(76, 175, 80, 0.5);
        }

        .episode-btn-watched.watched {
            background: #4CAF50;
            color: #fff;
        }

        .episode-btn-watch {
            background: var(--accent);
            color: #000;
        }

        .episode-btn-watch:hover {
            background: #ffb700;
        }

        /* Loading states */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--accent);
        }

        .loading i {
            font-size: 3rem;
            margin-bottom: 15px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* No content */
        .no-content {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .no-content i {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        /* Torrents overlay for series loading */
        .torrents-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            overflow-y: auto;
        }

        .torrents-overlay.active {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 20px;
        }

        .torrents-container {
            width: 100%;
            max-width: 900px;
            background: rgba(20, 20, 20, 0.95);
            border-radius: 15px;
            padding: 30px;
            margin-top: 20px;
        }

        .torrents-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 0;
            border-bottom: none;
        }

        .torrents-header h2 {
            margin: 0;
            color: var(--text-color);
            font-size: 1.5rem;
            border-bottom: none;
        }

        .torrents-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.3s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .torrents-close:hover {
            background: rgba(255,255,255,0.15);
            color: var(--accent);
        }

        .torrents-container {
            width: 100%;
            max-width: 900px;
            background: #0a0a0a;
            border-radius: 15px;
            padding: 30px;
            margin-top: 20px;
            border: 1px solid rgba(218, 165, 32, 0.2);
        }

        .search-loading {
            text-align: center;
            padding: 40px 20px;
        }

        .search-loading i {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .search-loading h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
        }

        .search-loading p {
            color: #888;
        }

        /* Series info styles */
        .torrent-info-detailed {
            padding: 0;
        }

        .torrent-info-detailed > div {
            margin-bottom: 20px;
        }

        .torrent-info-detailed h3 {
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .player-info-detailed {
            padding: 20px;
        }

        .player-info-detailed h3 {
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .tv-series-page {
                padding: 30px 20px;
            }

            .tv-show-layout {
                flex-direction: column;
                height: auto;
            }

            .seasons-list-container {
                width: 100%;
                max-height: 300px;
            }

            .episodes-list-container {
                max-height: 500px;
            }
        }
    </style>
</head>
<body class="tv-series-page">
    <nav class="sidebar">
        <ul>
            <li><a href="/search"><i class="fas fa-search"></i></a></li>
            <li><a href="/"><i class="fas fa-home"></i></a></li>
            <li><a href="/favorites"><i class="fas fa-star"></i></a></li>
            <li><a href="/history"><i class="fas fa-history"></i></a></li>
            <li><a href="#"><i class="fas fa-cog"></i></a></li>
        </ul>
    </nav>

    <!-- Backdrop -->
    {% if item.backdrop_path %}
    <div class="tv-backdrop" style="background-image: url('{{ item.backdrop_path }}');">
        <div class="tv-backdrop-overlay"></div>
    </div>
    {% else %}
    <div class="tv-backdrop" style="background-image: url('{{ url_for('static', filename='img/background.jpg') }}');">
        <div class="tv-backdrop-overlay"></div>
    </div>
    {% endif %}

    <!-- Back button -->
    <a href="javascript:history.back()" class="back-to-prev" title="Назад">
        <i class="fas fa-arrow-left"></i>
    </a>

    <!-- Content -->
    <div class="tv-content">
        <div class="tv-show-layout">
            <!-- Seasons list - left column -->
            <div class="seasons-list-container">
                <div id="seasonsList">
                    <div class="loading">
                        <i class="fas fa-spinner"></i>
                        <p>Загрузка сезонов...</p>
                    </div>
                </div>
            </div>

            <!-- Episodes list - center column -->
            <div class="episodes-list-container">
                <div id="episodesList">
                    <div class="loading">
                        <i class="fas fa-spinner"></i>
                        <p>Выберите сезон...</p>
                    </div>
                </div>
            </div>

            <!-- Episode info - right column -->
            <div class="episode-info-container">
                <div id="episodeInfo">
                    <div class="episode-info-placeholder">
                        <i class="fas fa-tv"></i>
                        <p>Выберите серию чтобы увидеть информацию</p>
                    </div>
                </div>
                
                <!-- Watch button - separate panel -->
                <div id="watchButtonContainer" style="display: none; margin-top: 20px;">
                    <div style="display: flex; gap: 15px; align-items: center;">
                        <button class="episode-btn episode-btn-watch" onclick="watchCurrentEpisode()" style="flex: 1; justify-content: center; padding: 18px 25px; font-size: 1.1rem; border-radius: 27px;" title="Смотреть">
                            <i class="fas fa-play"></i> Смотреть
                        </button>
                        <button class="episode-btn episode-btn-watch" onclick="selectTorrentForEpisode()" style="width: 54px; height: 54px; display: flex; align-items: center; justify-content: center; padding: 0; font-size: 1.1rem; border-radius: 50%;" title="Выбрать раздачу">
                            <i class="fas fa-database"></i>
                        </button>
                    </div>
                    <div id="selectedTorrentInfo" style="margin-top: 10px; padding: 10px; background: rgba(0, 0, 0, 0.5); border-radius: 10px; display: none;">
                        <p style="margin: 0; font-size: 0.9rem; color: #888;">Раздача для сезона <span id="selectedTorrentSeason"></span>:</p>
                        <p id="selectedTorrentTitle" style="margin: 5px 0 0 0; color: var(--accent); font-size: 0.95rem;"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const TV_ID = {{ item.id }};
        const TV_TITLE = "{{ item.title|replace('"', '\\"') }}";
        let seasonsData = {};
        let currentSeason = 1;
        let currentEpisode = null;
        let watchedEpisodes = new Set();

        // Load watched episodes from localStorage
        function loadWatchedEpisodes() {
            const saved = localStorage.getItem(`tv_watched_${TV_ID}`);
            if (saved) {
                watchedEpisodes = new Set(JSON.parse(saved));
            }
        }

        // Save watched episodes to localStorage
        function saveWatchedEpisodes() {
            localStorage.setItem(`tv_watched_${TV_ID}`, JSON.stringify([...watchedEpisodes]));
        }

        // Load seasons on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadWatchedEpisodes();
            loadSelectedTorrents();
            loadSeasons();
        });

        // Load all seasons
        async function loadSeasons() {
            try {
                const response = await fetch(`/api/tv/${TV_ID}/seasons`);
                const data = await response.json();

                const container = document.getElementById('seasonsList');

                if (!data.seasons || data.seasons.length === 0) {
                    container.innerHTML = `
                        <div class="no-content">
                            <i class="fas fa-inbox"></i>
                            <p>Сезоны не найдены</p>
                        </div>
                    `;
                    return;
                }

                seasonsData = {};

                let html = '';
                data.seasons.forEach((season, index) => {
                    html += `
                        <div class="season-item ${index === 0 ? 'active' : ''}" 
                             onclick="selectSeason(${season.season_number}, this)">
                            <h4>${season.name}</h4>
                            <p><i class="fas fa-film"></i> ${season.episode_count} серий</p>
                        </div>
                    `;
                });

                container.innerHTML = html;

                // Find first season with unwatched episodes
                let targetSeason = data.seasons[0].season_number;
                for (let i = 0; i < data.seasons.length; i++) {
                    const seasonNum = data.seasons[i].season_number;
                    const hasUnwatched = await checkSeasonHasUnwatched(seasonNum);
                    if (hasUnwatched) {
                        targetSeason = seasonNum;
                        break;
                    }
                }

                // Load episodes for target season and select it
                const targetSeasonEl = container.querySelector(`.season-item[onclick*="${targetSeason}"]`);
                if (targetSeasonEl) {
                    selectSeason(targetSeason, targetSeasonEl);
                } else {
                    loadEpisodes(data.seasons[0].season_number);
                }
            } catch (error) {
                console.error('Error loading seasons:', error);
                document.getElementById('seasonsList').innerHTML = `
                    <div class="no-content">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Ошибка загрузки сезонов</p>
                    </div>
                `;
            }
        }

        // Check if season has unwatched episodes
        async function checkSeasonHasUnwatched(seasonNumber) {
            try {
                const response = await fetch(`/api/tv/${TV_ID}/season/${seasonNumber}/episodes`);
                const data = await response.json();
                
                if (!data.episodes) return false;
                
                for (const episode of data.episodes) {
                    const episodeKey = `S${seasonNumber}E${episode.episode_number}`;
                    if (!watchedEpisodes.has(episodeKey)) {
                        return true;  // Found unwatched episode
                    }
                }
                return false;  // All episodes watched
            } catch (error) {
                return false;
            }
        }

        // Select season
        function selectSeason(seasonNumber, element) {
            // Remove active class from all seasons
            document.querySelectorAll('.season-item').forEach(item => {
                item.classList.remove('active');
            });

            // Add active class to selected season
            element.classList.add('active');

            currentSeason = seasonNumber;

            // Load episodes for selected season
            loadEpisodes(seasonNumber);
        }

        // Load episodes for a season
        async function loadEpisodes(seasonNumber) {
            const container = document.getElementById('episodesList');
            container.innerHTML = `
                <div class="loading">
                    <i class="fas fa-spinner"></i>
                    <p>Загрузка серий...</p>
                </div>
            `;

            try {
                const response = await fetch(`/api/tv/${TV_ID}/season/${seasonNumber}/episodes`);
                const data = await response.json();

                if (!data.episodes || data.episodes.length === 0) {
                    container.innerHTML = `
                        <div class="no-content">
                            <i class="fas fa-film"></i>
                            <p>Серии не найдены</p>
                        </div>
                    `;
                    return;
                }

                seasonsData[seasonNumber] = data.episodes;

                let html = '<div class="episodes-list">';
                data.episodes.forEach((episode, index) => {
                    const episodeNum = episode.episode_number;
                    const airDate = episode.air_date || '';
                    const rating = episode.vote_average > 0 ? episode.vote_average : 'N/A';
                    
                    // Check if episode has aired
                    const hasAired = airDate && new Date(airDate) <= new Date();
                    const episodeClass = hasAired ? 'episode-item' : 'episode-item aired-future';
                    const clickHandler = hasAired ? `selectEpisode(${seasonNumber}, ${index}, this)` : '';
                    
                    // Check if episode is watched
                    const episodeKey = `S${seasonNumber}E${episodeNum}`;
                    const isWatched = watchedEpisodes.has(episodeKey);
                    const watchedIcon = isWatched ? 'fas fa-eye' : 'fas fa-eye-slash';
                    const watchedClass = isWatched ? 'watched' : '';
                    
                    // Disable watched button for unaired episodes
                    const watchedButtonDisabled = hasAired ? '' : 'disabled style="opacity: 0.3; cursor: not-allowed;"';

                    html += `
                        <div class="${episodeClass}" ${clickHandler ? 'onclick="' + clickHandler + '"' : ''} data-episode-index="${index}" data-season="${seasonNumber}">
                            <div class="episode-number-badge">E${episodeNum.toString().padStart(2, '0')}</div>
                            <div class="episode-info">
                                <div class="episode-title">${episode.name}</div>
                                <div class="episode-meta">
                                    <span><i class="fas fa-calendar"></i> ${airDate || 'Дата выхода неизвестна'}</span>
                                    ${episode.runtime ? `<span><i class="fas fa-clock"></i> ${episode.runtime} мин</span>` : ''}
                                    ${episode.vote_average > 0 ? `<span class="rating"><i class="fas fa-star"></i> ${rating}</span>` : ''}
                                </div>
                            </div>
                            <div class="episode-buttons">
                                <button class="episode-btn episode-btn-watched ${watchedClass}" ${watchedButtonDisabled} onclick="${hasAired ? 'event.stopPropagation(); toggleWatchedEpisode(this, \'' + episodeKey + '\')' : 'return false;'}" title="${hasAired ? 'Отметить как просмотренное' : 'Серия ещё не вышла'}">
                                    <i class="${watchedIcon}"></i>
                                </button>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';

                container.innerHTML = html;
                
                // Select first unwatched episode by default
                let selectedEpisode = false;
                
                for (let i = 0; i < data.episodes.length; i++) {
                    const episode = data.episodes[i];
                    const episodeNum = episode.episode_number;
                    const episodeKey = `S${seasonNumber}E${episodeNum}`;
                    
                    if (!watchedEpisodes.has(episodeKey)) {
                        // Found first unwatched episode
                        const episodeEl = container.querySelector(`[data-episode-index="${i}"]`);
                        if (episodeEl) {
                            selectEpisode(seasonNumber, i, episodeEl);
                            selectedEpisode = true;
                        }
                        break;
                    }
                }
                
                // If all episodes watched, select first episode
                if (!selectedEpisode && data.episodes.length > 0) {
                    const firstEpisodeEl = container.querySelector('[data-episode-index="0"]');
                    if (firstEpisodeEl) {
                        selectEpisode(seasonNumber, 0, firstEpisodeEl);
                    }
                }
            } catch (error) {
                console.error('Error loading episodes:', error);
                container.innerHTML = `
                    <div class="no-content">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Ошибка загрузки серий</p>
                    </div>
                `;
            }
        }

        // Select episode
        function selectEpisode(seasonNumber, index, element) {
            // Remove active class
            document.querySelectorAll('.episode-item').forEach(item => {
                item.classList.remove('active');
            });

            // Add active class
            if (element) {
                element.classList.add('active');
            }

            // Store current episode
            const episodes = seasonsData[seasonNumber];
            if (episodes && episodes[index]) {
                currentEpisode = episodes[index];
                console.log(`[TV] Выбрано: S${currentEpisode.season_number}E${currentEpisode.episode_number}`);
                showEpisodeInfo(episodes[index], seasonNumber);
                
                // Load selected torrent for this episode
                loadSelectedTorrentForEpisode(currentEpisode.season_number, currentEpisode.episode_number);
            }
        }

        // Show episode info
        function showEpisodeInfo(episode, seasonNumber) {

            const airDate = episode.air_date || 'Дата выхода неизвестна';
            const rating = episode.vote_average > 0 ? episode.vote_average : 'N/A';

            const overview = episode.overview || 'Описание отсутствует';

            const hasAired = episode.air_date && new Date(episode.air_date) <= new Date();

            container.innerHTML = `

                    <div class="episode-details-header">

                        <h3>${episode.name}</h3>
                        <div class="episode-meta-details">
                            <span><i class="fas fa-calendar"></i> ${airDate}</span>
                            <span><i class="fas fa-clock"></i> ${runtime}</span>
                            <span class="rating"><i class="fas fa-star"></i> ${rating}</span>
                        </div>
                    </div>
                    <div class="episode-description">
                        <h4><i class="fas fa-align-left"></i> Описание</h4>
                        <p>${overview}</p>
                    </div>
                </div>
            `;

            // Show watch button only if episode has aired

                    watchButtonContainer.style.display = 'block';

                    watchButtonContainer.querySelector('button').style.opacity = '1';
                    watchButtonContainer.querySelector('button').style.cursor = 'pointer';
                } else {
                    watchButtonContainer.style.display = 'block';
                    watchButtonContainer.querySelector('button').disabled = true;
                    watchButtonContainer.querySelector('button').style.opacity = '0.5';
                    watchButtonContainer.querySelector('button').style.cursor = 'not-allowed';
                    watchButtonContainer.querySelector('button').innerHTML = '<i class="fas fa-ban"></i> Серия ещё не вышла';

        // Toggle watched episode
        function toggleWatchedEpisode(btn, episodeKey) {
            btn.classList.toggle('watched');
            const icon = btn.querySelector('i');
            
            if (btn.classList.contains('watched')) {
                icon.className = 'fas fa-eye';
                watchedEpisodes.add(episodeKey);
                showNotification('Отмечено как просмотренное', 'success');
            } else {
                icon.className = 'fas fa-eye-slash';
                watchedEpisodes.delete(episodeKey);
                showNotification('Удалено из просмотренных', 'info');
            }
            
            // Save to localStorage
            saveWatchedEpisodes();
        }

        // Watch episode - search series and start streaming
        function watchEpisode(season, episode) {
            // Check if user has selected a specific torrent
            if (selectedTorrent) {
                console.log(`\n${'='.repeat(60)}`);
                console.log(`[TV] ========== USING SELECTED TORRENT ==========`);
                console.log(`[TV] Torrent: ${selectedTorrent.title}`);
                console.log(`[TV] Tracker: ${selectedTorrent.tracker}`);
                console.log(`[TV] Magnet: ${selectedTorrent.magnet.substring(0, 50)}...`);
                console.log(`${'='.repeat(60)}\n`);
                
                // Use selected torrent directly
                startSeriesStreaming(selectedTorrent, season, episode);
                return;
            }

            // Format: "Russian Name / English Name"
            let seriesName = TV_TITLE;
            let russianName = '';
            let englishName = '';

            // If title contains both Russian and English (separated by /)
            if (TV_TITLE.includes('/')) {
                const parts = TV_TITLE.split('/');
                if (parts.length >= 2) {
                    russianName = parts[0].trim();
                    englishName = parts[1].trim();
                    seriesName = `${russianName} / ${englishName}`;
                }
            } else {
                russianName = TV_TITLE;
            }

            console.log(`\n${'='.repeat(60)}`);
            console.log(`[TV] ========== WATCH EPISODE STARTED ==========`);
            console.log(`[TV] Series: ${seriesName}`);
            console.log(`[TV] Season: ${season}, Episode: ${episode}`);
            console.log(`[TV] TV_TITLE: ${TV_TITLE}`);
            console.log(`[TV] currentEpisode:`, currentEpisode);
            console.log(`${'='.repeat(60)}\n`);

            showNotification(`Поиск серии: ${seriesName} Сезон ${season}...`, 'info');

            // Show loading overlay
            console.log(`[TV] Creating loading overlay...`);
            showSeriesLoadingOverlay(seriesName, season, episode);

            // Step 1: Search for series using GENERAL search (returns ALL torrents including collections)
            // Use timestamp to bypass cache and get fresh results
            const timestamp = Date.now();
            console.log(`[TV] Searching for: ${seriesName} (timestamp: ${timestamp})`);
            fetch(`/api/torrents/search?q=${encodeURIComponent(seriesName)}&t=${timestamp}`)
            .then(r => r.json())
            .then(data => {
                console.log(`\n${'='.repeat(60)}`);
                console.log(`[TV] Search API response:`, data);
                console.log(`${'='.repeat(60)}\n`);

                if (data.success && data.results && data.results.length > 0) {
                    console.log(`[TV] ═════════════════════════════════════════`);
                    console.log(`[TV] Total results: ${data.results.length}`);
                    console.log(`[TV] ═════════════════════════════════════════`);
                    
                    // Log ALL results to see what we have
                    data.results.forEach((r, i) => {
                        console.log(`[TV] [${i+1}] ${r.title}`);
                        console.log(`      Tracker: ${r.tracker} | Seeds: ${r.seeds} | Quality: ${r.quality}`);
                    });
                    console.log(`[TV] ═════════════════════════════════════════`);
                    
                    // Collect all unique seasons from ALL results
                    const allSeasons = new Set();
                    // More flexible patterns to match various formats
                    const seasonRangePatterns = [
                        /сезон[:\s]*(\d+)\s*-\s*(\d+)/i,        // "Сезон: 1-15" or "Сезон 1-15"
                        /сезон[:\s]*(\d+)\s*серии[:\s]*(\d+)/i, // "Сезон 2 серии 1-22"
                        /(\d+)\s*-\s*(\d+)\s*серии/i,           // "1-22 серии"
                        /season[:\s]*(\d+)\s*-\s*(\d+)/i,       // "Season 1-15"
                    ];
                    const seasonSinglePatterns = [
                        /сезон[:\s]*(\d+)(?!\s*-\s*\d)/i,       // "Сезон: 2" but not "Сезон: 1-15"
                        /season[:\s]*(\d+)(?!\s*-\s*\d)/i,      // "Season: 2"
                    ];

                    data.results.forEach(r => {
                        const titleLower = r.title.toLowerCase();
                        
                        // Debug: log titles that contain "сезон" or "season"
                        if (titleLower.includes('сезон') || titleLower.includes('season')) {
                            console.log(`[TV] Found season title: ${r.title}`);
                        }

                        // Check for season ranges
                        let foundRange = false;
                        for (const pattern of seasonRangePatterns) {
                            const match = titleLower.match(pattern);
                            if (match) {
                                const start = parseInt(match[1]);
                                const end = parseInt(match[2]);
                                console.log(`[TV] Range match: ${start}-${end} in "${r.title}"`);
                                for (let i = start; i <= end; i++) {
                                    allSeasons.add(i);
                                }
                                foundRange = true;
                                break;
                            }
                        }
                        
                        // Check for single season (only if not already found as range)
                        if (!foundRange) {
                            for (const pattern of seasonSinglePatterns) {
                                const match = titleLower.match(pattern);
                                if (match) {
                                    const s = parseInt(match[1]);
                                    console.log(`[TV] Single season match: ${s} in "${r.title}"`);
                                    allSeasons.add(s);
                                    break;
                                }
                            }
                        }
                    });

                    // Format seasons list (e.g., "1-15" or "1-3, 5-9")
                    const sortedSeasons = Array.from(allSeasons).sort((a, b) => a - b);
                    let seasonDisplay = '';

                    if (sortedSeasons.length > 0) {
                        // Group consecutive seasons into ranges
                        const ranges = [];
                        let start = sortedSeasons[0];
                        let end = sortedSeasons[0];

                        for (let i = 1; i < sortedSeasons.length; i++) {
                            if (sortedSeasons[i] === end + 1) {
                                end = sortedSeasons[i];
                            } else {
                                ranges.push(start === end ? `${start}` : `${start}-${end}`);
                                start = sortedSeasons[i];
                                end = sortedSeasons[i];
                            }
                        }
                        ranges.push(start === end ? `${start}` : `${start}-${end}`);
                        seasonDisplay = ranges.join(', ');
                    } else {
                        seasonDisplay = 'N/A';
                    }

                    // Update overlay with full season info
                    const overlayTitle = `${russianName}${englishName ? ' / ' + englishName : ''} / Сезон: ${seasonDisplay}`;
                    updateOverlayTitle(overlayTitle);

                    // Filter out excluded patterns (TV shows only, not collections)
                    const excludedPatterns = [
                        /битва экстрасенсов/i,
                        /новая битва экстрасенсов/i,
                        /битва сильнейших/i,
                        /голос\.дети/i,
                        /голос\s+\d+/i,
                        /фабрика\s+звезд/i,
                        /дом[-\s]?2/i,
                        /первый\s+канал/i,
                        /россия\s+1/i,
                        /эфир\s+от/i,
                        /выпуск\s+\d+/i,
                    ];

                    // Filter results
                    const filteredResults = data.results.filter(r => {
                        const titleLower = r.title.toLowerCase();
                        for (const pattern of excludedPatterns) {
                            if (pattern.test(titleLower)) {
                                console.log(`[TV] Excluded: ${r.title}`);
                                return false;
                            }
                        }
                        return true;
                    });

                    console.log(`[TV] Filtered ${data.results.length} -> ${filteredResults.length} results`);

                    // Find the best torrent for THIS season:
                    // 1. First try to find exact season match (e.g., "Сезон: 2")
                    // 2. Then try collections (e.g., "Сезон: 1-5") that include THIS season
                    // 3. Fall back to first result
                    let torrent;

                    const seasonExact = filteredResults.find(r => {
                        const titleLower = r.title.toLowerCase();
                        // Match "Сезон: 2" but not "Сезон: 12" or "Сезон: 1-15"
                        const exactPattern = new RegExp(`сезон[:\\s]*${season}(?!\\d)(?![-\\s]*\\d)`, 'i');
                        return exactPattern.test(titleLower);
                    });

                    if (seasonExact) {
                        torrent = seasonExact;
                        console.log(`[TV] Found exact season match: ${torrent.title}`);
                    } else {
                        // Try to find collection that includes THIS season
                        const seasonCollection = filteredResults.find(r => {
                            const titleLower = r.title.toLowerCase();
                            // Match "Сезон: 1-5", "Сезон 1-5", etc.
                            const collectionPattern = /сезон[:\s]*(\d+)\s*-\s*(\d+)/i;
                            const match = titleLower.match(collectionPattern);
                            if (match) {
                                const startSeason = parseInt(match[1]);
                                const endSeason = parseInt(match[2]);
                                const includes = season >= startSeason && season <= endSeason;
                                console.log(`[TV] Collection: ${r.title} (${startSeason}-${endSeason}), includes ${season}: ${includes}`);
                                return includes;
                            }
                            return false;
                        });

                        if (seasonCollection) {
                            torrent = seasonCollection;
                            console.log(`[TV] Found season collection: ${torrent.title}`);
                        } else {
                            // Fall back to first result
                            torrent = filteredResults[0];
                            console.log(`[TV] Using first result: ${torrent.title}`);
                        }
                    }

                    console.log(`\n${'='.repeat(60)}`);
                    console.log(`[TV] ========== SELECTED TORRENT ==========`);
                    console.log(`[TV] Title: ${torrent.title}`);
                    console.log(`[TV] Tracker: ${torrent.tracker}`);
                    console.log(`[TV] Quality: ${torrent.quality}`);
                    console.log(`[TV] Seeds: ${torrent.seeds}`);
                    console.log(`[TV] Size: ${torrent.size}`);
                    console.log(`[TV] Magnet: ${torrent.magnet.substring(0, 50)}...`);
                    console.log(`${'='.repeat(60)}\n`);

                    updateLoadingOverlay('torrent', torrent);

                    // Step 2: Start streaming
                    startSeriesStreaming(torrent, season, episode);
                } else {
                    console.log(`[TV] No results found`);
                    hideLoadingOverlay();
                    showNotification('Серия не найдена', 'error');
                }
            })
            .catch(err => {
                console.error(`[TV] Search error:`, err);
                hideLoadingOverlay();
                showNotification('Ошибка поиска', 'error');
            });
        }
        
        // Start streaming for series episode
        function startSeriesStreaming(torrent, season, episode) {
            const seasonPadded = season < 10 ? `0${season}` : `${season}`;
            const episodePadded = episode < 10 ? `0${episode}` : `${episode}`;
            const episodePattern = `S${seasonPadded}E${episodePadded}`;

            console.log(`\n${'='.repeat(60)}`);
            console.log(`[TV] ========== START STREAMING ==========`);
            console.log(`[TV] Looking for file pattern: ${episodePattern}`);
            console.log(`[TV] Magnet: ${torrent.magnet.substring(0, 50)}...`);
            console.log(`[TV] Torrent: ${torrent.title}`);
            console.log(`${'='.repeat(60)}\n`);

            showNotification(`Запуск серии ${episodePattern}...`, 'info');

            // Check if overlay exists, if not create it
            let overlay = document.getElementById('seriesLoadingOverlay');
            if (!overlay) {
                console.log('[TV] Creating loading overlay...');
                showSeriesLoadingOverlay(`${TV_TITLE} Сезон ${season}`, season, episode);
            }

            // Update overlay to streaming stage
            console.log('[TV] Updating overlay to streaming stage...');
            updateLoadingOverlay('streaming', { pattern: episodePattern, torrent: torrent });

            fetch('/api/torrent/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    magnet: torrent.magnet,
                    title: `${torrent.title} - Серия ${episode}`,
                    query: `${TV_TITLE} Сезон ${season}`,
                    episode_pattern: episodePattern,
                    media_type: 'tv',
                    tmdb_id: TV_ID
                })
            })
            .then(r => r.json())
            .then(data => {
                console.log(`\n${'='.repeat(60)}`);
                console.log(`[TV] Start response:`, data);
                console.log(`${'='.repeat(60)}\n`);

                if (data.success) {
                    console.log(`[TV] Серия запущена! Video URL: ${data.video_url}`);
                    showNotification('Серия запущена!', 'success');
                } else {
                    console.error(`[TV] Ошибка запуска:`, data.message);
                    showNotification(data.message || 'Ошибка запуска', 'error');
                    hideLoadingOverlay();
                }
            })
            .catch(err => {
                console.error('[TV] Ошибка запуска:', err);
                hideLoadingOverlay();
                showNotification('Ошибка запуска', 'error');
            });
        }

        // Load torrent file list
        function loadTorrentFiles(magnet, episodePattern) {
            const fileList = document.getElementById('fileList');
            if (!fileList) return;
            
            // Get torrent info hash from magnet
            const hashMatch = magnet.match(/btih:([a-fA-F0-9]{40})/);
            if (!hashMatch) {
                fileList.innerHTML = '<p style="color: #888;">Не удалось получить информацию о файлах</p>';
                return;
            }
            
            const infoHash = hashMatch[1];
            
            // Request file list from server
            fetch(`/api/torrent/files?hash=${infoHash}`)
            .then(r => r.json())
            .then(data => {
                if (data.success && data.files && data.files.length > 0) {
                    let html = '<div style="max-height: 300px; overflow-y: auto;">';
                    
                    data.files.forEach((file, index) => {
                        const isPlaying = file.path.includes(episodePattern);
                        const fileName = file.path.split('/').pop();
                        
                        html += `
                            <div style="
                                padding: 12px;
                                margin-bottom: 8px;
                                background: ${isPlaying ? 'rgba(76, 175, 80, 0.2)' : 'rgba(255,255,255,0.05)'};
                                border: ${isPlaying ? '2px solid #4CAF50' : '1px solid rgba(255,255,255,0.1)'};
                                border-radius: 8px;
                                ${isPlaying ? 'animation: pulse 2s infinite;' : ''}
                            ">
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <i class="fas fa-${isPlaying ? 'play-circle' : 'file'}" style="color: ${isPlaying ? '#4CAF50' : '#888'};"></i>
                                    <div style="flex: 1;">
                                        <p style="margin: 0; color: ${isPlaying ? '#4CAF50' : 'var(--text-color)'}; font-size: 0.9rem;">
                                            ${escapeHtml(fileName)}
                                        </p>
                                        <p style="margin: 5px 0 0 0; color: #888; font-size: 0.75rem;">
                                            ${file.size || 'Unknown size'}
                                        </p>
                                    </div>
                                    ${isPlaying ? '<span style="color: #4CAF50; font-size: 0.75rem;"><i class="fas fa-circle" style="font-size: 6px;"></i> Воспроизводится</span>' : ''}
                                </div>
                            </div>
                        `;
                    });
                    
                    html += '</div>';
                    fileList.innerHTML = html;
                } else {
                    fileList.innerHTML = '<p style="color: #888;">Файлы не найдены</p>';
                }
            })

                console.error('[Files] Error:', err);
                fileList.innerHTML = '<p style="color: #888;">Ошибка загрузки списка файлов</p>';
            });
        }

        // Show loading overlay with detailed info
        function showSeriesLoadingOverlay(seriesName, season, episode) {
            console.log(`[Overlay] Creating loading overlay...`);
            console.log(`[Overlay] Series: ${seriesName}, Season: ${season}, Episode: ${episode}`);
            
            // Remove existing overlay if any
            const existing = document.getElementById('seriesLoadingOverlay');

        // Poll series streaming status
        function pollSeriesStatus() {
            fetch('/api/torrent/status')
            .then(r => r.json())
            .then(data => {
                console.log('[Status]', data);

                // Update playing state first
                const wasPlaying = window.wasPlaying || false;
                window.wasPlaying = data.playing;

                // Close window if MPV was playing and now stopped
                if (wasPlaying && !data.playing) {
                    console.log('[Status] MPV closed, closing window');
                    hideLoadingOverlay();
                    return;
                }

                // Cap progress at 100%
                const cappedProgress = data.progress !== undefined ? Math.min(data.progress, 100) : 0;
                const progressText = cappedProgress.toFixed(1) + '%';
                const speedText = data.download_speed || data.speed || '0 MB/s';
                const downloadedText = data.downloaded || '0 MB';
                const filename = data.filename || '';
                const peersCount = data.peers || 0;
                
                // Parse AV position for playback progress
                let avPercent = 0;
                let avCurrent = '';
                let avTotal = '';
                let isPaused = false;
                
                if (data.av_line) {
                    // Parse "AV: 00:02:15 / 00:43:15 (5%)"
                    const avMatch = data.av_line.match(/AV:\s*(\d+:\d+:\d+)\s*\/\s*(\d+:\d+:\d+)\s*\((\d+)%\)/);
                    if (avMatch) {
                        avCurrent = avMatch[1];
                        avTotal = avMatch[2];
                        avPercent = parseInt(avMatch[3]);
                    }
                }
                
                // Check if paused (look for paused indicator in status)
                if (data.av_line && data.av_line.includes('Paused')) {
                    isPaused = true;
                }

                // Update UI elements
                const progressEl = document.getElementById('streamProgress');
                const progressPercentEl = document.getElementById('streamProgressPercent');
                const progressBarEl = document.getElementById('streamProgressBar');
                const speedEl = document.getElementById('streamSpeed');
                const downloadedEl = document.getElementById('streamDownloaded');
                const filenameEl = document.getElementById('streamFilename');
                const infoPeersEl = document.getElementById('infoPeers');

                if (progressEl) progressEl.textContent = progressText;
                if (progressPercentEl) progressPercentEl.textContent = progressText;
                if (progressBarEl) progressBarEl.style.width = cappedProgress + '%';
                if (speedEl) speedEl.textContent = speedText;
                if (downloadedEl) downloadedEl.textContent = downloadedText;
                if (filenameEl && filename) filenameEl.textContent = filename;
                if (infoPeersEl) infoPeersEl.textContent = peersCount;
                
                // Update playback progress (always visible)
                const avPercentEl = document.getElementById('avPercent');
                const avCurrentEl = document.getElementById('avCurrent');
                const avTotalEl = document.getElementById('avTotal');
                const playbackProgressBarEl = document.getElementById('playbackProgressBar');
                
                if (avPercentEl) avPercentEl.textContent = avPercent + '%';
                if (avCurrentEl) avCurrentEl.textContent = avCurrent || '0:00:00';
                if (avTotalEl) avTotalEl.textContent = avTotal || '0:00:00';
                if (playbackProgressBarEl) playbackProgressBarEl.style.width = avPercent + '%';
                
                // Auto-mark episode as watched when 100% reached
                if (avPercent >= 95 && currentEpisode && !window.episodeMarkedAsWatched) {
                    const episodeKey = `S${currentEpisode.season_number}E${currentEpisode.episode_number}`;
                    if (!watchedEpisodes.has(episodeKey)) {
                        console.log('[Playback] Episode 95%+ watched, marking as watched');
                        watchedEpisodes.add(episodeKey);
                        saveWatchedEpisodes();
                        window.episodeMarkedAsWatched = true;
                        
                        // Update UI to show watched status
                        const watchedBtn = document.querySelector(`.episode-btn-watched[onclick*="${episodeKey}"]`);
                        if (watchedBtn) {
                            watchedBtn.classList.add('watched');
                            const icon = watchedBtn.querySelector('i');
                            if (icon) {
                                icon.className = 'fas fa-eye';
                            }
                        }
                        
                        showNotification('Серия отмечена как просмотренная', 'success');
                    }
                }
            })
            .catch(err => {
                console.log('[Status] Poll error:', err);
                // Stop polling after network error (server stopped)
                if (window.seriesStatusInterval) {
                    clearInterval(window.seriesStatusInterval);
                    window.seriesStatusInterval = null;
                }
                // Close window after a few seconds
                setTimeout(() => {
                    hideLoadingOverlay();
                }, 2000);
            });
        }
        
        // Hide loading overlay
        function hideLoadingOverlay() {
            const overlay = document.getElementById('seriesLoadingOverlay');
            if (overlay) {
                overlay.remove();
            }
        }

        // Watch current episode
        function watchCurrentEpisode() {
            if (currentEpisode) {
                watchEpisode(currentEpisode.season_number, currentEpisode.episode_number);
            } else {
                showNotification('Выберите серию сначала', 'error');

        // ==================== Torrent Selection ====================

        let selectedTorrent = null; // Store selected torrent for current season
        let selectedTorrents = {}; // Map: season -> torrent

        // Load selected torrents from localStorage
        function loadSelectedTorrents() {
            const saved = localStorage.getItem(`tv_torrents_${TV_ID}`);
            if (saved) {
                try {
                    selectedTorrents = JSON.parse(saved);
                } catch (e) {
                    console.error('Error loading selected torrents:', e);
                    selectedTorrents = {};
                }
            }
        }

        // Save selected torrents to localStorage
        function saveSelectedTorrents() {
            localStorage.setItem(`tv_torrents_${TV_ID}`, JSON.stringify(selectedTorrents));
        }

        // Select torrent for episode
        async function selectTorrentForEpisode() {
            if (!currentEpisode) {
                showNotification('Выберите серию сначала', 'error');
                return;
            }

            const season = currentEpisode.season_number;
            const episode = currentEpisode.episode_number;
            
            // Two search queries: exact season AND season catalogs
            const queries = [
                `${TV_TITLE} сезон ${season}`,           // Exact season: "Сверхъестественное сезон 2"
                `${TV_TITLE} сезоны`,                    // Catalogs: "Сверхъестественное сезоны"
                `${TV_TITLE} сезон 1-15`,                // Common range format
            ];

            showNotification('Поиск раздач...', 'info');
            console.log(`\n${'='.repeat(60)}`);
            console.log(`[TV] ========== TORRENT SELECTION ==========`);
            console.log(`[TV] Season: ${season}, Episode: ${episode}`);
            console.log(`${'='.repeat(60)}\n`);

            try {
                let allResults = [];
                const seenMagnets = new Set();
                
                // Try each query
                for (const query of queries) {
                    console.log(`[TV] Search query: ${query}`);
                    const response = await fetch(`/api/torrents/search?q=${encodeURIComponent(query)}&t=${Date.now()}`);
                    const data = await response.json();
                    
                    if (data.success && data.results && data.results.length > 0) {
                        console.log(`[TV] Found ${data.results.length} results for: ${query}`);
                        
                        // Add unique results (by magnet)
                        data.results.forEach(r => {
                            if (r.magnet && !seenMagnets.has(r.magnet)) {
                                seenMagnets.add(r.magnet);
                                allResults.push(r);
                                console.log(`[TV]   + ${r.title} (${r.tracker})`);
                            }
                        });
                    }
                }
                
                console.log(`\n[TV] Total unique results: ${allResults.length}`);
                console.log(`${'='.repeat(60)}\n`);

                if (allResults.length > 0) {
                    showTorrentSelectionModal(allResults, season, episode);
                } else {
                    showNotification('Раздачи не найдены', 'error');
                }
            } catch (error) {
                console.error('Error searching torrents:', error);
                showNotification('Ошибка поиска раздач', 'error');
            }
        }

        // Show torrent selection modal
        function showTorrentSelectionModal(torrents, season, episode) {
            // Sort torrents (RuTracker first, by quality)
            torrents.sort((a, b) => {
                const aTracker = (a.tracker || '').toLowerCase();

                const aIsRutracker = aTracker.includes('rutracker');
                const bIsRutracker = bTracker.includes('rutracker');

                if (aIsRutracker && !bIsRutracker) return -1;
                if (!aIsRutracker && bIsRutracker) return 1;

                // Same quality, sort by seeds
                return (parseInt(b.seeds) || 0) - (parseInt(a.seeds) || 0);

                item.onmouseout = () => { item.style.borderColor = 'rgba(218, 165, 32, 0.3)'; item.style.background = '#000000'; };
                item.onclick = () => {

        // Handle torrent selection
        function selectTorrentForEpisodeHandler(torrent, season, episode) {
            // Save to season-specific storage
            selectedTorrents[season] = torrent;
            selectedTorrent = torrent; // Also set current
            saveSelectedTorrents();

            // Update UI
            const infoDiv = document.getElementById('selectedTorrentInfo');

            showNotification('Раздача выбрана!', 'success');
        }

        // Load selected torrent for current season
        function loadSelectedTorrentForEpisode(season, episode) {
            // Load from season-specific storage
            const torrent = selectedTorrents[season];

            if (torrent) {
                selectedTorrent = torrent;
                const infoDiv = document.getElementById('selectedTorrentInfo');
                const titleEl = document.getElementById('selectedTorrentTitle');
                const seasonEl = document.getElementById('selectedTorrentSeason');

                if (infoDiv && titleEl) {
                    infoDiv.style.display = 'block';
                    titleEl.textContent = `${torrent.title} (${torrent.tracker}, ${torrent.quality || 'N/A'})`;
                    if (seasonEl) seasonEl.textContent = season;
                }
            } else {
                // No torrent selected for this season
                selectedTorrent = null;
                const infoDiv = document.getElementById('selectedTorrentInfo');
                if (infoDiv) infoDiv.style.display = 'none';
            }
        }

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `<i class="fas fa-${type === 'success' ? 'check' : 'info'}-circle"></i><span>${message}</span>`;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
